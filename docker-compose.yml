version: '3.8'
services:
  backend:
    build: { context: backend, dockerfile: Dockerfile }
    ports: ['5001:5001']
    volumes: ['./data:/app/../data']
    environment: { PORT: 5001, FLASK_ENV: production }
    restart: unless-stopped
  frontend:
    build: { context: frontend, dockerfile: Dockerfile }
    ports: ['5173:80']
    depends_on: [backend]
    restart: unless-stopped
